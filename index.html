<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Estudio Chaparro</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1f2c3a,#3d5873);
margin:0;
color:white;
text-align:center;
}

header{
padding:40px;
font-size:32px;
font-weight:bold;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
padding:40px;
}

.card{
background:white;
color:#333;
width:260px;
padding:30px;
border-radius:10px;
text-decoration:none;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.icon{
font-size:50px;
margin-bottom:15px;
}

.titulo{
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<header>⚖️ Estudio Chaparro</header>

<div class="container">

<a class="card" href="/calculadoraintereses/">
<div class="icon">📊</div>
<div class="titulo">Calculadora de Intereses</div>
</a>

<a class="card" href="/movilidadhaber/">
<div class="icon">📈</div>
<div class="titulo">Movilidad del Haber</div>
</a>

<a class="card" href="/herramientas/">
<div class="icon">🧰</div>
<div class="titulo">Herramientas</div>
</a>

</div>

</body>
</html>
